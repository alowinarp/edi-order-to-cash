name: dbt CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-build:
    name: dbt build (seed + run + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt-bigquery
        run: pip install dbt-core==1.11.7 dbt-bigquery==1.11.1

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_sa_key.json

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          printf 'edi_order_to_cash:\n  target: ci\n  outputs:\n    ci:\n      type: bigquery\n      method: service-account\n      project: edi-order-to-cash\n      dataset: edi_order_to_cash\n      location: asia-southeast1\n      keyfile: /tmp/gcp_sa_key.json\n      threads: 4\n      timeout_seconds: 300\n' > ~/.dbt/profiles.yml

      - name: dbt deps
        working-directory: ${{ github.workspace }}
        run: dbt deps

      - name: dbt build
        working-directory: ${{ github.workspace }}
        run: dbt build --profiles-dir ~/.dbt --target ci

      - name: Upload dbt logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-logs
          path: logs/dbt.log
